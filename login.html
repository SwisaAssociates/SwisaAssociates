<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SWISA Admin Login</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:Poppins;
background:#020617;
color:#fff;
display:flex;
align-items:center;
justify-content:center;
height:100vh;
}

.box{
background:rgba(255,255,255,0.05);
padding:30px;
border-radius:16px;
border:1px solid rgba(255,255,255,0.1);
width:300px;
text-align:center;
}

input{
width:100%;
padding:12px;
margin:8px 0;
border-radius:8px;
border:none;
outline:none;
background:#0f172a;
color:#fff;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:10px;
background:linear-gradient(135deg,#3b82f6,#6366f1);
color:#fff;
cursor:pointer;
font-weight:600;
}

.error{
color:#ef4444;
font-size:13px;
margin-top:10px;
}
</style>
</head>

<body>

<div class="box">
<h2>🔐 SWISA ADMIN</h2>

<input id="user" placeholder="Username">
<input id="pass" type="password" placeholder="Password">

<button onclick="login()">Login</button>

<div class="error" id="error"></div>
</div>

<script>
function login(){

const u = document.getElementById("user").value;
const p = document.getElementById("pass").value;

/* 🔑 DEFAULT LOGIN */
if(u === "admin" && p === "1234"){
localStorage.setItem("swisa_auth","true");
window.location.href="dashboard.html";
}else{
document.getElementById("error").innerText="Invalid credentials";
}

}
</script>

</body>
</html>
