<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SWISA Dashboard | Secure Admin Panel</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins;}

body{
background:#020617;
color:#e5e7eb;
}

/* LOGIN SCREEN */
.login-screen{
position:fixed;
inset:0;
background:#020617;
display:flex;
align-items:center;
justify-content:center;
z-index:9999;
}

.login-box{
background:rgba(255,255,255,0.05);
padding:30px;
border-radius:16px;
border:1px solid rgba(255,255,255,0.1);
width:300px;
text-align:center;
}

.login-box input{
width:100%;
padding:12px;
margin-top:10px;
border-radius:8px;
border:none;
outline:none;
background:#0b1220;
color:#fff;
}

.login-box button{
width:100%;
margin-top:15px;
padding:12px;
border:none;
border-radius:10px;
background:linear-gradient(135deg,#3b82f6,#6366f1);
color:#fff;
cursor:pointer;
}

/* SIDEBAR */
.sidebar{
width:240px;
height:100vh;
position:fixed;
background:rgba(255,255,255,0.03);
border-right:1px solid rgba(255,255,255,0.08);
padding:22px;
backdrop-filter:blur(16px);
}

.sidebar h2{color:#3b82f6;margin-bottom:25px;}

.sidebar a{
display:block;
color:#94a3b8;
text-decoration:none;
padding:9px;
margin:8px 0;
border-radius:10px;
transition:0.3s;
}

.sidebar a:hover{
background:rgba(59,130,246,0.12);
color:#3b82f6;
transform:translateX(4px);
}

/* MAIN */
.main{
margin-left:260px;
padding:30px;
}

/* TOPBAR */
.topbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:25px;
}

.title{font-size:20px;font-weight:600;}

.btn{
padding:10px 14px;
border:none;
border-radius:10px;
background:linear-gradient(135deg,#3b82f6,#6366f1);
color:#fff;
cursor:pointer;
font-size:13px;
margin-left:8px;
}

/* CARDS */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:18px;
}

.card{
background:rgba(255,255,255,0.04);
padding:22px;
border-radius:16px;
border:1px solid rgba(255,255,255,0.08);
}

.number{
font-size:32px;
font-weight:700;
color:#3b82f6;
}

/* TABLE */
.table{
margin-top:25px;
background:rgba(255,255,255,0.03);
padding:15px;
border-radius:16px;
border:1px solid rgba(255,255,255,0.08);
}

table{width:100%;border-collapse:collapse;}

th,td{
padding:12px;
text-align:left;
font-size:14px;
color:#cbd5e1;
border-bottom:1px solid rgba(255,255,255,0.06);
}

.delete{color:#ef4444;cursor:pointer;}

.dot{
width:8px;height:8px;
background:#22c55e;
border-radius:50%;
display:inline-block;
margin-right:6px;
animation:pulse 1.5s infinite;
}

@keyframes pulse{
0%{opacity:1;}
50%{opacity:0.3;}
100%{opacity:1;}
}

/* MOBILE */
@media(max-width:900px){
.sidebar{display:none;}
.main{margin-left:0;padding:18px;}
}

</style>
</head>

<body>

<!-- 🔐 LOGIN -->
<div class="login-screen" id="loginScreen">
<div class="login-box">
<h3>🔐 Admin Login</h3>
<input type="password" id="pass" placeholder="Enter Password">
<button onclick="login()">Login</button>
</div>
</div>

<!-- SIDEBAR -->
<div class="sidebar">
<h2>🌍 SWISA</h2>
<a href="index.html">Home</a>
<a href="services.html">Modules</a>
<a href="about.html">About</a>
<a href="contact.html">Contact</a>
<a href="dashboard.html">Dashboard</a>
</div>

<!-- MAIN -->
<div class="main">

<div class="topbar">
<div class="title">📊 Secure Lead Dashboard</div>
<div>
<button class="btn" onclick="exportCSV()">📥 Export</button>
<button class="btn" onclick="loadLeads()">🔄 Refresh</button>
</div>
</div>

<div class="grid">

<div class="card">
<div class="number" id="total">0</div>
<div>Total Leads</div>
</div>

<div class="card">
<div class="number" id="today">0</div>
<div>Today Leads</div>
</div>

<div class="card">
<div class="number"><span class="dot"></span>LIVE</div>
<div>System Status</div>
</div>

</div>

<div class="table">

<div id="loading">Connecting...</div>

<table id="table" style="display:none;">
<thead>
<tr>
<th>Name</th>
<th>Phone</th>
<th>Time</th>
<th>Action</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>

</div>

</div>

<!-- FIREBASE -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, onSnapshot, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyC1KD3II4xpP2V1MY4M2-EelW4pvUBsacU",
authDomain: "swisa-associates1.firebaseapp.com",
projectId: "swisa-associates1"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let leads = [];

/* LOGIN */
window.login = function(){
const pass = document.getElementById("pass").value;
if(pass === "admin123"){
document.getElementById("loginScreen").style.display="none";
loadLeads();
}else{
alert("Wrong Password");
}
}

/* LOAD */
function loadLeads(){
onSnapshot(collection(db,"leads"),(snap)=>{
leads = snap.docs.map(d=>({id:d.id,...d.data()}));
render();
document.getElementById("loading").style.display="none";
});
}
window.loadLeads = loadLeads;

/* RENDER */
function render(){

document.getElementById("total").innerText = leads.length;

let todayCount=0;
const today=new Date().toDateString();

const tbody=document.getElementById("tbody");
tbody.innerHTML="";

leads.forEach(l=>{

let t=new Date(l.time);

if(t.toDateString()===today) todayCount++;

tbody.innerHTML+=`
<tr>
<td>${l.name||""}</td>
<td>${l.phone||""}</td>
<td>${t.toLocaleString()}</td>
<td class="delete" onclick="delLead('${l.id}')">Delete</td>
</tr>
`;

});

document.getElementById("today").innerText=todayCount;
}

/* DELETE */
window.delLead = async function(id){
if(!confirm("Delete?")) return;
await deleteDoc(doc(db,"leads",id));
}

/* EXPORT */
window.exportCSV=function(){
let csv="Name,Phone,Time\n";
leads.forEach(l=>{
csv+=`${l.name},${l.phone},${new Date(l.time)}\n`;
});
const blob=new Blob([csv]);
const a=document.createElement("a");
a.href=URL.createObjectURL(blob);
a.download="leads.csv";
a.click();
}

</script>

</body>
</html>
