<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SWISA Dashboard | Premium Admin Panel</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600;700&display=swap" rel="stylesheet">

<style>

*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins;}

body{
background:#020617;
color:#e5e7eb;
}

/* LOGIN */
.login-screen{
position:fixed;
inset:0;
background:rgba(2,6,23,0.98);
display:flex;
align-items:center;
justify-content:center;
z-index:9999;
}

.login-box{
background:rgba(255,255,255,0.05);
padding:32px;
border-radius:16px;
border:1px solid rgba(255,255,255,0.1);
width:320px;
text-align:center;
backdrop-filter:blur(15px);
}

.login-box input{
width:100%;
padding:12px;
margin-top:10px;
border-radius:8px;
border:none;
outline:none;
background:#0b1220;
color:#fff;
}

.login-box button{
width:100%;
margin-top:15px;
padding:12px;
border:none;
border-radius:10px;
background:linear-gradient(135deg,#3b82f6,#6366f1);
color:#fff;
cursor:pointer;
font-weight:600;
}

.eye{
position:absolute;
right:12px;
top:50%;
transform:translateY(-50%);
cursor:pointer;
}

/* ERROR */
.error{
color:#ef4444;
font-size:13px;
margin-top:8px;
display:none;
}

/* SIDEBAR */
.sidebar{
width:240px;
height:100vh;
position:fixed;
background:rgba(255,255,255,0.03);
border-right:1px solid rgba(255,255,255,0.08);
padding:22px;
}

.sidebar h2{color:#3b82f6;margin-bottom:25px;}

.sidebar a{
display:block;
color:#94a3b8;
text-decoration:none;
padding:9px;
margin:8px 0;
border-radius:10px;
}

.sidebar a:hover{color:#3b82f6;background:rgba(59,130,246,0.1);}

/* MAIN */
.main{
margin-left:260px;
padding:30px;
}

/* TOPBAR */
.topbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:25px;
}

.btn{
padding:10px 14px;
border:none;
border-radius:10px;
background:linear-gradient(135deg,#3b82f6,#6366f1);
color:#fff;
cursor:pointer;
font-size:13px;
margin-left:8px;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:18px;
}

.card{
background:rgba(255,255,255,0.04);
padding:22px;
border-radius:16px;
border:1px solid rgba(255,255,255,0.08);
transition:0.3s;
}

.card:hover{transform:translateY(-4px);}

.number{
font-size:32px;
font-weight:700;
color:#3b82f6;
}

/* TABLE */
.table{
margin-top:25px;
background:rgba(255,255,255,0.03);
padding:15px;
border-radius:16px;
}

table{width:100%;border-collapse:collapse;}

th,td{
padding:12px;
border-bottom:1px solid rgba(255,255,255,0.06);
color:#cbd5e1;
}

.delete{color:#ef4444;cursor:pointer;}

.dot{
width:8px;height:8px;
background:#22c55e;
border-radius:50%;
display:inline-block;
margin-right:6px;
animation:pulse 1.5s infinite;
}

@keyframes pulse{
0%{opacity:1;}
50%{opacity:0.3;}
100%{opacity:1;}
}

/* DEMO */
.switch{
color:#94a3b8;
font-size:13px;
display:flex;
gap:10px;
align-items:center;
}

.toggle{
width:40px;height:20px;
background:#1e293b;
border-radius:20px;
position:relative;
cursor:pointer;
}

.toggle::after{
content:"";
width:16px;height:16px;
background:white;
border-radius:50%;
position:absolute;
top:2px;left:2px;
transition:0.3s;
}

.toggle.active::after{left:22px;}
.toggle.active{background:#3b82f6;}

</style>
</head>

<body>

<!-- LOGIN -->
<div class="login-screen" id="loginScreen">
<div class="login-box">
<h3>🔐 Admin Login</h3>

<div style="position:relative;">
<input type="password" id="pass" placeholder="Enter Password">
<span class="eye" onclick="togglePass()">👁</span>
</div>

<div class="error" id="error">Wrong password</div>

<button onclick="login()">Login</button>
</div>
</div>

<!-- SIDEBAR -->
<div class="sidebar">
<h2>SWISA</h2>
<a href="index.html">Home</a>
<a href="dashboard.html">Dashboard</a>
</div>

<!-- MAIN -->
<div class="main">

<div class="topbar">
<h2>📊 Dashboard</h2>

<div class="switch">
Demo Mode
<div class="toggle" id="demoToggle" onclick="toggleDemo()"></div>
<button class="btn" onclick="logout()">Logout</button>
</div>
</div>

<!-- STATS -->
<div class="grid">
<div class="card">
<div class="number" id="total">0</div>
<div>Total Leads</div>
</div>

<div class="card">
<div class="number" id="today">0</div>
<div>Today Leads</div>
</div>

<div class="card">
<div class="number"><span class="dot"></span>LIVE</div>
<div>Status</div>
</div>
</div>

<!-- LIVE FEED -->
<div class="table">
<h3>🔥 Live Activity</h3>
<div id="activity"></div>
</div>

<!-- TABLE -->
<div class="table">
<table>
<thead>
<tr>
<th>Name</th>
<th>Phone</th>
<th>Time</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>
</div>

</div>

<!-- SCRIPT -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyC1KD3II4xpP2V1MY4M2-EelW4pvUBsacU",
authDomain: "swisa-associates1.firebaseapp.com",
projectId: "swisa-associates1"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let leads = [];
let demo = false;

/* LOGIN */
window.login = function(){
const pass = document.getElementById("pass").value;

if(pass === "SAAALIMasad85"){
localStorage.setItem("login","true");
document.getElementById("loginScreen").style.display="none";
loadLeads();
}else{
document.getElementById("error").style.display="block";
}
}

/* AUTO LOGIN */
if(localStorage.getItem("login")==="true"){
document.getElementById("loginScreen").style.display="none";
loadLeads();
}

/* LOGOUT */
window.logout = function(){
localStorage.removeItem("login");
location.reload();
}

/* PASSWORD TOGGLE */
window.togglePass = function(){
const i=document.getElementById("pass");
i.type = i.type==="password"?"text":"password";
}

/* DEMO */
window.toggleDemo = function(){
demo=!demo;
document.getElementById("demoToggle").classList.toggle("active");
render();
}

/* LOAD */
function loadLeads(){
onSnapshot(collection(db,"leads"),(snap)=>{
leads = snap.docs.map(d=>d.data());
render();
});
}
window.loadLeads = loadLeads;

/* RENDER */
function render(){

let data = demo ? fake() : leads;

document.getElementById("total").innerText = demo?12000:data.length;
document.getElementById("today").innerText = demo?300:Math.floor(data.length/3);

const tbody=document.getElementById("tbody");
tbody.innerHTML="";

data.slice(0,8).forEach(l=>{
tbody.innerHTML+=`
<tr>
<td>${l.name||"User"}</td>
<td>${l.phone||"000"}</td>
<td>${new Date().toLocaleString()}</td>
</tr>`;
});

document.getElementById("activity").innerHTML =
demo
? "🔥 200+ visitors today<br>💬 50 WhatsApp clicks<br>🚀 High conversion flow"
: "📡 Live Firebase leads running";
}

function fake(){
return Array.from({length:10},(_,i)=>({name:"Lead "+i,phone:"98XXXXXX"}));
}

</script>

</body>
</html>
