<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SWISA Dashboard | Control Panel</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins}
body{background:#020617;color:#e5e7eb}

/* LAYOUT */
.wrapper{display:flex}

/* SIDEBAR */
.sidebar{
width:250px;height:100vh;position:fixed;
background:rgba(255,255,255,0.03);
border-right:1px solid rgba(255,255,255,0.08);
padding:25px;backdrop-filter:blur(15px);
}
.sidebar h2{color:#3b82f6;margin-bottom:30px}
.sidebar a{
display:block;color:#94a3b8;text-decoration:none;
margin:12px 0;padding:8px;border-radius:8px;transition:0.3s;
}
.sidebar a:hover{
background:rgba(59,130,246,0.1);
color:#3b82f6;transform:translateX(4px);
}

/* MAIN */
.main{margin-left:270px;padding:40px}

/* TOP */
.topbar{
display:flex;justify-content:space-between;align-items:center;
margin-bottom:25px;gap:10px;flex-wrap:wrap;
}

.btn{
padding:10px 14px;
background:linear-gradient(135deg,#3b82f6,#6366f1);
border:none;color:#fff;border-radius:10px;
cursor:pointer;font-size:13px;transition:0.3s;
}
.btn:hover{transform:translateY(-3px);box-shadow:0 10px 25px rgba(59,130,246,0.3)}

/* SEARCH */
.search{
padding:10px;border-radius:8px;border:none;
background:#020617;color:#fff;border:1px solid rgba(255,255,255,0.1);
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
margin-bottom:25px;
}

.card{
background:rgba(255,255,255,0.04);
padding:20px;border-radius:16px;
border:1px solid rgba(255,255,255,0.08);
transition:0.3s;
}
.card:hover{
transform:translateY(-6px);
border-color:#3b82f6;
}

.number{font-size:28px;color:#3b82f6;font-weight:700}
.label{font-size:13px;color:#94a3b8}

/* TABLE */
.table{
background:rgba(255,255,255,0.04);
border-radius:16px;padding:20px;
border:1px solid rgba(255,255,255,0.08);
}

table{width:100%;border-collapse:collapse}
th,td{
padding:10px;font-size:13px;
border-bottom:1px solid rgba(255,255,255,0.06);
}
th{color:#94a3b8}

tr:hover{background:rgba(59,130,246,0.05)}

/* DELETE */
.delete{
background:#ef4444;
border:none;color:#fff;
padding:6px 10px;border-radius:6px;
cursor:pointer;font-size:12px;
}

/* LIVE DOT */
.dot{
width:8px;height:8px;background:#22c55e;
border-radius:50%;display:inline-block;margin-right:6px;
animation:pulse 1.5s infinite;
}
@keyframes pulse{
0%{opacity:1}50%{opacity:0.3}100%{opacity:1}
}

/* MOBILE */
@media(max-width:900px){
.sidebar{display:none}
.main{margin-left:0;padding:20px}
}
</style>
</head>

<body>

<div class="wrapper">

<div class="sidebar">
<h2>🌍 SWISA SYSTEM</h2>
<a href="index.html">🏠 Home</a>
<a href="services.html">⚙ Modules</a>
<a href="about.html">📘 About</a>
<a href="contact.html">📞 Access</a>
<a href="dashboard.html">📊 Dashboard</a>
<a href="sell.html">💰 Pricing</a>
</div>

<div class="main">

<div class="topbar">
<h1>📊 Dashboard <span class="dot"></span></h1>

<input class="search" id="search" placeholder="Search name...">

<div>
<button class="btn" onclick="exportCSV()">📥 Export</button>
<button class="btn" onclick="location.reload()">🔄 Refresh</button>
</div>
</div>

<!-- STATS -->
<div class="grid">
<div class="card"><div class="number" id="total">0</div><div class="label">Total Leads</div></div>
<div class="card"><div class="number" id="today">0</div><div class="label">Today</div></div>
<div class="card"><div class="number" id="last">-</div><div class="label">Last Lead</div></div>
<div class="card"><div class="number">LIVE</div><div class="label">System Active</div></div>
</div>

<!-- TABLE -->
<div class="table">
<table>
<thead>
<tr>
<th>Name</th>
<th>Phone</th>
<th>Time</th>
<th>Action</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>
</div>

</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
getFirestore, collection, onSnapshot, deleteDoc, doc
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
apiKey:"AIzaSyC1KD3II4xpP2V1MY4M2-EelW4pvUBsacU",
authDomain:"swisa-associates1.firebaseapp.com",
projectId:"swisa-associates1"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const table = document.getElementById("table");
const search = document.getElementById("search");

let leadsData = [];

/* REALTIME */
onSnapshot(collection(db,"leads"), (snapshot)=>{
table.innerHTML="";
leadsData = [];

let total=0, today=0, last="-";
const todayDate = new Date().toDateString();

snapshot.forEach(docSnap=>{
const data = docSnap.data();
const id = docSnap.id;

const time = new Date(data.time.seconds*1000);
const dateStr = time.toLocaleString();

if(time.toDateString() === todayDate) today++;

total++;
last = data.name;

leadsData.push({id,...data,time:dateStr});

renderTable(leadsData);
});

document.getElementById("total").innerText=total;
document.getElementById("today").innerText=today;
document.getElementById("last").innerText=last;

});

/* RENDER */
function renderTable(data){
table.innerHTML="";
data.forEach(l=>{
table.innerHTML+=`
<tr>
<td>${l.name}</td>
<td>${l.phone}</td>
<td>${l.time}</td>
<td><button class="delete" onclick="deleteLead('${l.id}')">Delete</button></td>
</tr>`;
});
}

/* DELETE */
window.deleteLead = async function(id){
await deleteDoc(doc(db,"leads",id));
}

/* SEARCH */
search.addEventListener("input",()=>{
const val = search.value.toLowerCase();
const filtered = leadsData.filter(l=>l.name.toLowerCase().includes(val));
renderTable(filtered);
});

/* EXPORT */
window.exportCSV = function(){
let csv="Name,Phone,Time\n";
leadsData.forEach(l=>{
csv+=`${l.name},${l.phone},${l.time}\n`;
});

const blob=new Blob([csv],{type:"text/csv"});
const url=URL.createObjectURL(blob);

const a=document.createElement("a");
a.href=url;
a.download="leads.csv";
a.click();
}
</script>

</body>
</html>
